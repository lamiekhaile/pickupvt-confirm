<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verification</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }
  p { color: #555; font-size: 14px; }
</style>
</head>
<body>
  <p id="status">Verifying you're human&hellip;</p>
  <div
    class="cf-turnstile"
    data-sitekey="0x4AAAAAAD3PZ0cdkeBq0kX9"
    data-callback="onVerify"
    data-error-callback="onError"
    data-expired-callback="onExpire"
    data-theme="light"
  ></div>
  <script>
    // Loaded in a real system-browser session (ASWebAuthenticationSession /
    // Custom Tabs via expo-web-browser), not an embedded WebView — a plain
    // WKWebView blocks the cross-origin storage/cookie access Turnstile's
    // challenge iframe needs, which is what made the old embedded version
    // hang on Cloudflare's own spinner forever. A real browser session
    // doesn't have that restriction. Communication back to the app is via
    // redirecting to the app's custom URL scheme instead of postMessage,
    // since there's no WebView bridge in this context.
    function redirect(params) {
      var qs = Object.keys(params)
        .map(function (k) { return k + "=" + encodeURIComponent(params[k]); })
        .join("&");
      window.location.href = "pickupvt://captcha-callback?" + qs;
    }
    function onVerify(token) {
      document.getElementById("status").textContent = "Verified — returning to the app…";
      redirect({ token: token });
    }
    function onError(code) {
      document.getElementById("status").textContent = "Verification failed — returning to the app…";
      redirect({ error: code || "unknown" });
    }
    function onExpire() {
      redirect({ error: "expired" });
    }

    setTimeout(function () {
      if (typeof turnstile === "undefined") {
        document.getElementById("status").textContent = "Couldn't load verification — returning to the app…";
        redirect({ error: "script_load_timeout" });
      }
    }, 10000);
  </script>
</body>
</html>
