<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email confirmed — PickUp VT</title>
<style>
  :root {
    --maroon: #5B0025;
    --ember: #D9600F;
    --chalk: #F7F4EE;
    --ink: #1C1420;
    --gray: #8B8580;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--chalk);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card { max-width: 420px; text-align: center; }
  .check {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--maroon); color: var(--chalk);
    font-size: 44px; line-height: 88px;
    margin: 0 auto 24px;
  }
  .eyebrow {
    color: var(--ember); font-size: 12px; font-weight: 600;
    letter-spacing: 2px; margin-bottom: 6px;
  }
  h1 {
    color: var(--maroon);
    font-size: 34px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  p { color: var(--ink); font-size: 16px; line-height: 1.55; }
  .sub { color: var(--gray); font-size: 13px; margin-top: 20px; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <div class="eyebrow">PICKUP VT</div>
    <h1>You're confirmed</h1>
    <p>Your email is verified. Head back to the PickUp VT app and sign in — time to find a run.</p>
    <p class="sub">You can close this tab.</p>
  </div>
</body>
</html>
